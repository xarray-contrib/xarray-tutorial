jupyter_bokeh = ">=4.1.0,<5"
jupyterlab-myst = ">=2.7.0,<3"
jupyter-resource-usage = ">=1.2.1,<2"
cartopy = ">=0.25.0,<0.26"
cf_xarray = ">=0.11.3,<0.12"
dask = ">=2026.7.0,<2027"
datashader = ">=0.19.1,<0.20"
distributed = ">=2026.7.0,<2027"
gcsfs = ">=2026.7.0,<2027"
geoviews-core = ">=1.15.1,<2"
